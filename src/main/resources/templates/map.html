<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head-resources :: head-resources}"></head>
<body>

<div class="container">
    <!-- 왼쪽 사이드바 -->
    <aside class="sidebar">
        <div th:replace="~{fragments/sidebar :: sidebarContent}"></div>
    </aside>

    <!-- 메인 지도 -->
    <main class="map-container">
        <div id="map"></div>
    </main>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<!-- 지도 초기화 + 테스트 히트맵 (나중에 GDELT 데이터로 대체) -->
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        const map = L.map('map').setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 임시 테스트 데이터 → 나중에 GdeltService에서 가져올 거
        const heatData = /*[[${heatPoints}]]*/ [[37.8, -96.0, 15], [55.7, 37.6, 20], [35.6, 139.7, 25]];

        L.heatLayer(heatData, {
            radius: 30,
            blur: 20,
            gradient: {0.2: 'blue', 0.5: 'lime', 0.8: 'yellow', 1.0: 'red'}
        }).addTo(map);
    });
</script>

</body>
</html>
